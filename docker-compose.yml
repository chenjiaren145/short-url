services:
  app:
    build: ./backend
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    command: ["./short-url", "-store", "redis", "-redis-addr", "redis:6379"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: always

volumes:
  redis_data:
